# Setup
title: Shawn Park | 박성찬
description: Learnings, Discoveries, and Actions
url: https://shawnpark5605.github.io
avatar: /assets/profile2.jpg
paginate: 5
permalink: pretty
cover_image: /assets/bg1.jpg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec
  - vendor/
  - node_modules/

# Optimize Jekyl SEO Tag
twitter:
  username: vszhub
  card: summary
logo: logo.png
social:
  name: Songzi Vong
  links:
    - https://twitter.com/vszhub
    - https://github.com/vszhub
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Giscus comments (GitHub Discussions)
# Get your values from https://giscus.app
giscus:
  repo: shawnpark07/shawnpark07.github.io
  repo_id: R_kgDOIrUkWQ
  category: General
  category_id: DIC_kwDOIrUkWc4C3g_X

# Specify the author for blog posts
author:
  name: Shawn Park
  url: https://github.com/shawnpark07/
  email: shawnpark5605@gmail.com

